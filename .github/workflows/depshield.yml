name: Dependency safety

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: corepack enable
      - run: npm ci
      - run: npm run security:lockfile --if-present
